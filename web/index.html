<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>SommSavvy</title>
    <meta
      name="description"
      content="A pocket sommelier for wine, beer, and spirits. Photo, voice, or text — recommendations and bottle analysis with a personal cellar that learns your taste."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SommSavvy — your pocket sommelier" />
    <meta
      property="og:description"
      content="Snap a bottle. Get a recommendation that learns your taste. After hours."
    />
    <meta property="og:url" content="https://sommsavvy.msagent.ai" />
    <meta
      property="og:image"
      content="https://i.mscdn.ai/42da083b-07b3-4d8f-89c6-1c3ba8419e38/generated-images/4053baf9-9572-4cf3-98f3-acf8fc796ac8.png?w=2400&fm=jpg&q=88"
    />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="SommSavvy — your pocket sommelier. After hours." />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SommSavvy — your pocket sommelier" />
    <meta
      name="twitter:description"
      content="Snap a bottle. Get a recommendation that learns your taste. After hours."
    />
    <meta
      name="twitter:image"
      content="https://i.mscdn.ai/42da083b-07b3-4d8f-89c6-1c3ba8419e38/generated-images/4053baf9-9572-4cf3-98f3-acf8fc796ac8.png?w=2400&fm=jpg&q=88"
    />

    <!-- Mobile theme color matches the Midnight canvas so the browser chrome blends in. -->
    <meta name="theme-color" content="#14100D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon — the brass-S monogram from the design system. -->
    <link
      rel="icon"
      href="https://i.mscdn.ai/42da083b-07b3-4d8f-89c6-1c3ba8419e38/generated-images/78406251-f219-452c-8d34-9bd5dbc2033d.png?w=128&fm=png"
    />

    <!-- Fonts: Rowan (editorial serif) + Geist (modern grotesque). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=rowan@300,400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
